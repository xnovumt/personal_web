<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi Catálogo — películas, series, música y anime</title>
  <meta name="description" content="Catálogo personal de películas, series, música y anime que he visto y me gustaron." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>Mi Catálogo</h1>
          <p class="tagline">Lo que he visto, escuchado y me gustó.</p>
        </div>
      </div>
      <div class="stats" id="stats" aria-live="polite"></div>
    </div>
  </header>

  <nav class="controls wrap" aria-label="Filtros del catálogo">
    <div class="tabs" id="tabs" role="tablist"></div>
    <div class="controls-right">
      <label class="search">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0A4.5 4.5 0 1 1 14 9.5 4.49 4.49 0 0 1 9.5 14Z"/></svg>
        <input type="search" id="search" placeholder="Buscar por título…" aria-label="Buscar por título" />
      </label>
      <label class="sort">
        <span class="sr-only">Ordenar por</span>
        <select id="sort" aria-label="Ordenar por">
          <option value="recent">Recientes</option>
          <option value="rating">Mejor valorados</option>
          <option value="year">Más nuevos</option>
          <option value="title">Título (A–Z)</option>
        </select>
      </label>
    </div>
  </nav>

  <main class="wrap">
    <section id="grid" class="grid" aria-label="Colección"></section>
    <div id="empty" class="empty" hidden>
      <p>No hay nada aquí todavía.</p>
      <p class="empty-hint">Prueba con otro filtro o búsqueda.</p>
    </div>
  </main>

  <footer class="site-footer wrap">
    <p>Catálogo personal · construido como sitio estático.</p>
  </footer>

  <!-- Detalle -->
  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" data-close aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z"/></svg>
      </button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="data/media.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
