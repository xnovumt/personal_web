<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <script>
    (function(){try{var t=localStorage.getItem("theme");if(t!=="light"&&t!=="dark")t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.dataset.theme=t;}catch(e){}})();
  </script>
  <title>emotions vault — cine, series, música y anime</title>
  <meta name="description" content="Bóveda personal de emociones: películas, series, música y anime que he visto, escuchado y me marcaron." />

  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,600&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="masthead-strip">
        <span>Bóveda de emociones</span>
        <div class="strip-right">
          <span class="strip-cats"><span class="accent">Cine</span> · Series · Música · Anime</span>
          <button class="theme-toggle" id="theme-toggle" type="button"></button>
        </div>
      </div>
      <div class="masthead">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7L8 5Z"/></svg>
          </span>
          <div>
            <h1 class="wordmark">emotions vault</h1>
            <p class="tagline">Lo que he visto, escuchado y me marcó — guardado bajo llave.</p>
          </div>
        </div>
        <div class="ledger" id="stats" aria-live="polite"></div>
      </div>
    </div>
  </header>

  <nav class="controls wrap" aria-label="Filtros del catálogo">
    <div class="tabs" id="tabs" role="tablist"></div>
    <div class="controls-right">
      <button class="add-btn" id="add-btn" type="button" aria-label="Agregar ítem">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
        <span>Agregar</span>
      </button>
      <button class="genre-btn" id="genre-btn" type="button" hidden aria-expanded="false" aria-controls="genre-panel"></button>
      <label class="search">
        <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0A4.5 4.5 0 1 1 14 9.5 4.49 4.49 0 0 1 9.5 14Z"/></svg>
        <input type="search" id="search" placeholder="Buscar título…" aria-label="Buscar por título" />
      </label>
      <label class="sort">
        <span class="sr-only">Ordenar por</span>
        <select id="sort" aria-label="Ordenar por">
          <option value="recent">Recientes</option>
          <option value="rating">Mejor valorados</option>
          <option value="year">Más nuevos</option>
          <option value="title">Título A–Z</option>
        </select>
      </label>
    </div>
  </nav>

  <div class="genre-panel wrap" id="genre-panel" hidden aria-label="Filtrar por género"></div>

  <main class="wrap">
    <section id="grid" class="grid" aria-label="Colección"></section>
    <div id="empty" class="empty" hidden>
      <p>La bóveda está vacía.</p>
      <p class="empty-hint">Prueba con otro filtro o búsqueda.</p>
    </div>
  </main>

  <footer class="site-footer wrap">
    <p>emotions vault · bóveda personal · sitio estático.</p>
  </footer>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" data-close aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z"/></svg>
      </button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="modal" id="editor-modal" hidden>
    <div class="modal-backdrop" id="editor-backdrop" hidden data-close></div>
    <div class="modal-card modal-card--editor" role="dialog" aria-modal="true" aria-labelledby="editor-title">
      <button class="modal-close" data-close aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41Z"/></svg>
      </button>
      <div class="modal-body">
        <h2 id="editor-title" class="editor-heading">Nuevo ítem</h2>
        <p id="editor-feedback" class="editor-feedback" hidden></p>
        <form id="editor-form" novalidate>
          <div class="field">
            <label for="editor-type">Tipo</label>
            <select id="editor-type" required>
              <option value="movie">Película</option>
              <option value="series">Serie</option>
              <option value="music">Música</option>
              <option value="anime">Anime</option>
            </select>
          </div>
          <div class="field">
            <label for="editor-title">Título</label>
            <input type="text" id="editor-title" required placeholder="Título" />
          </div>
          <div class="field">
            <label for="editor-creator">Creador / Estudio</label>
            <input type="text" id="editor-creator" placeholder="Director, artista o estudio" />
          </div>
          <div class="field-row">
            <div class="field">
              <label for="editor-year">Año</label>
              <input type="number" id="editor-year" placeholder="2024" min="1800" max="2100" />
            </div>
            <div class="field">
              <label for="editor-rating">Rating (0–5)</label>
              <input type="number" id="editor-rating" placeholder="4.5" min="0" max="5" step="0.5" />
            </div>
            <div class="field">
              <label for="editor-status">Estado</label>
              <select id="editor-status">
                <option value="pending">Pendiente</option>
                <option value="watching">Viendo / Reproduciendo</option>
                <option value="haven't finish">No terminado</option>
                <option value="had watched">Visto / Escuchado</option>
              </select>
            </div>
            <div class="field">
              <label for="editor-favorite">Favorito</label>
              <input type="checkbox" id="editor-favorite" />
            </div>
          </div>
          <div class="field">
            <label for="editor-genres">Géneros (separados por coma)</label>
            <input type="text" id="editor-genres" placeholder="Drama, Aventura" />
          </div>
          <div class="field">
            <label for="editor-note">Nota personal</label>
            <textarea id="editor-note" rows="3" placeholder="Por qué me gustó…"></textarea>
          </div>
          <div class="field">
            <label for="editor-poster">URL de carátula</label>
            <div class="poster-search">
              <input type="url" id="editor-poster" placeholder="https://…" />
              <button type="button" class="secondary" id="editor-search-poster">🔍 Buscar carátula</button>
            </div>
            <div id="editor-poster-preview" class="poster-preview"></div>
          </div>
          <div class="editor-actions">
            <button type="button" class="danger" id="editor-delete" hidden>Eliminar</button>
            <div class="editor-actions-right">
              <button type="button" class="secondary" data-close>Cancelar</button>
              <button type="submit" class="primary">Guardar</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="data/seeds.js"></script>
  <script src="data/storage.js"></script>
  <script src="js/posters.js"></script>
  <script src="js/app.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/cognee.js"></script>
</body>
</html>
